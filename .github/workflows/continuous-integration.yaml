    - name: ūüď§ Publish client package to npm registry
      if: ${{ startsWith(github.ref, 'refs/tags') }}
      uses: JS-DevTools/npm-publish@v2
      with:
        package: clients/TypeScript/packages/${{ matrix.package }}/package.json
        strategy: upgrade
        token: ${{ secrets.NPM_TOKEN }}

