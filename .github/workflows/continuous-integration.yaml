  # ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ      ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ      ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ  ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ   ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ   ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ‚ĖĎ

  docker_combined:
    needs: [ server_build ]
    runs-on: ${{ matrix.os == 'linux' && 'ubuntu-22.04' }}
    strategy:
      matrix:
        os: [ linux ]
        target: [ cardano-node-ogmios ]
        network: [ mainnet, preprod, preview ]
        cardano-node: [ 11.0.1 ]
        cardano-node-latest: [  11.0.1 ]
        arch: [ x86_64 ]
    steps:
    - name: ūüď• Checkout repository
      uses: actions/checkout@v3
      with:
        submodules: true

    - name: ūüßį Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: ūüßź hadolint
      uses: brpaz/hadolint-action@v1.5.0
      with:
        dockerfile: "./Dockerfile"
        failure-threshold: warning
        ignore: DL3029 DL3059

    - name: ūüź≥ Login to DockerHub
      if: ${{ github.event_name == 'push' }}
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

    - name: ūüďĚ Base Variables
      id: base-variables
      run: |
        echo "image=cardanosolutions/${{ matrix.target }}" >> $GITHUB_OUTPUT

    - name: ūüďĚ Tag Variables
      if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags') }}
      id: tag-variables
      run: |
        echo "tag=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT

    - name: ūüď• Download
      uses: actions/download-artifact@v4
      with:
        name: ogmios-${{ github.sha }}-${{ matrix.arch }}-${{ matrix.os }}
        path: server

    - name: "ūüďł  :latest"
      id: build
      if: ${{ github.event_name == 'push' && matrix.network == 'mainnet' && github.ref == 'refs/heads/master' }}
      uses: docker/build-push-action@v4
      with:
        build-args: |
          NETWORK=${{ matrix.network }}
          CARDANO_NODE_IMAGE=ghcr.io/intersectmbo/cardano-node:${{ matrix.cardano-node-latest }}
        context: .
        push: true
        tags: ${{ steps.base-variables.outputs.image }}:latest
        target: ${{ matrix.target }}
        platforms: ${{ matrix.os }}/${{ matrix.arch == 'x86_64' && 'amd64' || 'arm64' }}
        cache-from: type=registry,ref=${{ steps.base-variables.outputs.image }}:latest
        cache-to: type=inline

    - name: "ūüďł  :latest-${{ matrix.network }}"
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
      uses: docker/build-push-action@v4
      with:
        build-args: |
          NETWORK=${{ matrix.network }}
          CARDANO_NODE_IMAGE=ghcr.io/intersectmbo/cardano-node:${{ matrix.cardano-node-latest }}
        context: .
        push: true
        tags: ${{ steps.base-variables.outputs.image }}:latest-${{ matrix.network }}
        target: ${{ matrix.target }}
        platforms: ${{ matrix.os }}/${{ matrix.arch == 'x86_64' && 'amd64' || 'arm64' }}
        cache-from: type=registry,ref=${{ steps.base-variables.outputs.image }}:latest-${{ matrix.network }}
        cache-to: type=inline

    - name: "ūüŹ∑ÔłŹ  :v*.*.*"
      if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags') && matrix.network == 'mainnet' }}
      uses: docker/build-push-action@v4
      with:
        build-args: |
          NETWORK=${{ matrix.network }}
          CARDANO_NODE_IMAGE=ghcr.io/intersectmbo/cardano-node:${{ matrix.cardano-node }}
        context: .
        push: true
        tags: ${{ steps.base-variables.outputs.image }}:${{ steps.tag-variables.outputs.tag }}_${{ matrix.cardano-node }}
        target: ${{ matrix.target }}
        platforms: ${{ matrix.os }}/${{ matrix.arch == 'x86_64' && 'amd64' || 'arm64' }}
        cache-from: type=registry,ref=${{ steps.base-variables.outputs.image }}:latest
        cache-to: type=inline

    - name: "ūüŹ∑ÔłŹ  :v*.*.*-${{ matrix.network }}"
      if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags') }}
      uses: docker/build-push-action@v4
      with:
        build-args: |
          NETWORK=${{ matrix.network }}
          CARDANO_NODE_IMAGE=ghcr.io/intersectmbo/cardano-node:${{ matrix.cardano-node }}
        context: .
        push: true
        tags: ${{ steps.base-variables.outputs.image }}:${{ steps.tag-variables.outputs.tag }}_${{ matrix.cardano-node }}-${{ matrix.network }}
        target: ${{ matrix.target }}
        platforms: ${{ matrix.os }}/${{ matrix.arch == 'x86_64' && 'amd64' || 'arm64' }}
        cache-from: type=registry,ref=${{ steps.base-variables.outputs.image }}:latest-${{ matrix.network }}
        cache-to: type=inline

  docker_standalone:
    needs: [ server_build ]
    runs-on: ${{ matrix.os == 'linux' && 'ubuntu-22.04' }}
    strategy:
      matrix:
        os: [ linux ]
        target: [ ogmios ]
        arch: [ x86_64, aarch64 ]
    steps:
    - name: ūüď• Checkout repository
      uses: actions/checkout@v3
      with:
        submodules: true

    - name: ūüßį Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: ūüßź hadolint
      uses: brpaz/hadolint-action@v1.5.0
      with:
        dockerfile: "./Dockerfile"
        failure-threshold: warning
        ignore: DL3029 DL3059

    - name: ūüź≥ Login to DockerHub
      if: ${{ github.event_name == 'push' }}
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

    - name: ūüďĚ Base Variables
      id: base-variables
      run: |
        echo "image=cardanosolutions/${{ matrix.target }}" >> $GITHUB_OUTPUT

    - name: ūüďĚ Tag Variables
      if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags') }}
      id: tag-variables
      run: |
        echo "tag=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT

    - name: ūüďĚ Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ steps.base-variables.outputs.image }}
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=semver,pattern=v{{version}}

    - name: ūüď• Download
      uses: actions/download-artifact@v4
      with:
        name: ogmios-${{ github.sha }}-${{ matrix.arch }}-${{ matrix.os }}
        path: server

    - name: ūüďł  Build image
      id: build
      if: ${{ github.event_name == 'push' }}
      uses: docker/build-push-action@v4
      with:
        context: .
        target: ${{ matrix.target }}
        platforms: ${{ matrix.os }}/${{ matrix.arch == 'x86_64' && 'amd64' || 'arm64' }}
        cache-from: type=registry,ref=${{ steps.base-variables.outputs.image }}:latest
        cache-to: type=inline
        outputs: type=image,name=${{ steps.base-variables.outputs.image }},push-by-digest=true,name-canonical=true,push=true

    - name: ūüĒ° Export digest
      if: ${{ github.event_name == 'push' }}
      run: |
        mkdir -p /tmp/digests
        digest="${{ steps.build.outputs.digest }}"
        touch "/tmp/digests/${digest#sha256:}"

    - name: ūüíĺ  Upload digest
      if: ${{ github.event_name == 'push' }}
      uses: actions/upload-artifact@v4
      with:
        name: digests-${{ matrix.arch == 'x86_64' && 'amd64' || 'arm64' }}
        path: /tmp/digests/*
        if-no-files-found: error
        retention-days: 1

  registry:
    needs: [ docker_standalone ]
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [ ogmios ]
    steps:
      - name: ūüď• Download digests (amd)
        uses: actions/download-artifact@v4
        with:
          name: digests-amd64
          path: /tmp/digests

      - name: ūüď• Download digests (arm)
        uses: actions/download-artifact@v4
        with:
          name: digests-arm64
          path: /tmp/digests

      - name: ūüßį  Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: ūüďĚ Base Variables
        id: base-variables
        run: |
          echo "image=cardanosolutions/${{ matrix.target }}" >> $GITHUB_OUTPUT

      - name: ūüďĚ Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.base-variables.outputs.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern=v{{version}}

      - name: ūüź≥ Login to DockerHub
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: ūüď¶ Create manifest list and push
        if: ${{ github.event_name == 'push' }}
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ steps.base-variables.outputs.image }}@sha256:%s ' *)

      - name: ūüßź Inspect image
        if: ${{ github.event_name == 'push' }}
        run: |
          docker buildx imagetools inspect ${{ steps.base-variables.outputs.image }}:${{ steps.meta.outputs.version }}
